<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MLP</title>
</head>
<body>
    <div id="divider">
        <div>
            <h1>Train your MLP</h1>
            <div>Individua Rombi, </div>
    <div id="lr">Learning rate: <input type="range" name="" id="lr-range" min="0.1" max="1" step="0.1" value="0.1"> <span id="lr-val">0.1</span></div>
    <div id="tf">Training Frequency: <input type="range" name="" id="tf-range" min="1" max="10000" step="1" value="2000"> <span id="tf-val">2000</span></div>

    <input type="button" value="Train!" id="train">
<input type="button" value="Comincia" id="fire">
    <br>
    <br>
    <h2>Plot punti PCA</h2>

    <div class="t"><div>Punto: 0 TRIANGOLO</div><canvas class="plotter" width="400" height="400"></canvas></div>
    <div class="t"><div>Punto: 1 QUADRATO</div><canvas class="plotter" width="400" height="400"></canvas></div>
    <div class="t"><div>Punto: 2 CERCHIO</div><canvas class="plotter" width="400" height="400"></canvas></div>
        </div>
        <div>
            <div>Disegna la tua immagine (disegno grande tutta griglia)</div>
            <div class="grid" id="grid"></div>
        <input type="button" id="guess" value="GUESS">
        <input type="button" id="clear" value="CLEAR">
        </div>
    </div>

    <!--<script src="https://unpkg.com/pca-js@1.0.0/pca.min.js"></script>-->
    <script type="module" src="ai.js"></script>
</body>
</html>
